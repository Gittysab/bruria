<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ברוריה • בת מצווה</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Suez+One&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue:        #2f5aa8;
    --blue-deep:   #1f3f7a;
    --blue-soft:   #7ea2d6;
    --gingham:     #bcd0ee;
    --gingham-2:   #d9e6f7;
    --gold:        #d99a3a;
    --gold-soft:   #e8c07a;
    --cream:       #fbf9f3;
    --ink:         #34415c;
    --leaf:        #8aa86a;
    --shadow:      rgba(47, 90, 168, 0.18);
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Frank Ruhl Libre', serif;
    color: var(--ink);
    background:
      linear-gradient(rgba(251,249,243,.55), rgba(251,249,243,.55)),
      repeating-linear-gradient(0deg, var(--gingham) 0 22px, transparent 22px 44px),
      repeating-linear-gradient(90deg, var(--gingham) 0 22px, transparent 22px 44px),
      var(--gingham-2);
    background-blend-mode: normal;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* floating decorative daisies */
  .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .petal {
    position: absolute; top: -8%;
    animation: fall linear infinite;
    opacity: .8;
  }
  @keyframes fall {
    0%   { transform: translateY(-10vh) rotate(0deg);   opacity: 0; }
    10%  { opacity: .85; }
    100% { transform: translateY(110vh) rotate(360deg);  opacity: 0; }
  }

  .wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 28px 18px 60px; }

  /* ---- Hero card ---- */
  .hero {
    position: relative;
    background: var(--cream);
    border-radius: 28px;
    padding: 34px 26px 30px;
    box-shadow: 0 18px 40px var(--shadow);
    border: 2px solid #fff;
    overflow: hidden;
    text-align: center;
    animation: rise .9s cubic-bezier(.2,.8,.2,1) both;
  }
  .hero::before {
    content: "";
    position: absolute; inset: 10px;
    border: 2px dashed var(--gold-soft);
    border-radius: 20px;
    pointer-events: none;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }

  .bow { width: 78px; height: auto; margin: -6px auto 2px; display: block; animation: sway 4s ease-in-out infinite; transform-origin: top center; }
  @keyframes sway { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } }

  .flowers-row { display: flex; justify-content: center; gap: 6px; margin: 6px 0 4px; }
  .flowers-row svg { width: 30px; height: 30px; }
  .flowers-row svg:nth-child(2) { transform: scale(1.25); }

  .name {
    font-family: 'Suez One', serif;
    font-size: clamp(48px, 13vw, 96px);
    color: var(--blue);
    line-height: 1;
    margin: 6px 0 4px;
    letter-spacing: 1px;
    text-shadow: 0 2px 0 #fff, 0 4px 10px var(--shadow);
    animation: pop 1s .2s both;
  }
  @keyframes pop { from { opacity: 0; transform: scale(.7); } 60% { transform: scale(1.06); } to { opacity: 1; transform: scale(1); } }

  .divider { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 6px 0; color: var(--gold); }
  .divider .dots { letter-spacing: 4px; font-weight: 700; }
  .age-heart { position: relative; display: inline-grid; place-items: center; width: 56px; height: 52px; }
  .age-heart svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .age-heart span { position: relative; font-family: 'Suez One', serif; font-size: 22px; color: var(--gold); z-index: 1; }

  .subtitle { font-size: clamp(20px, 5vw, 30px); color: var(--blue-deep); font-weight: 700; margin: 4px 0 0; }

  /* ---- Slideshow ---- */
  .slideshow {
    position: relative;
    margin: 26px auto 0;
    background: var(--cream);
    border-radius: 24px;
    padding: 16px;
    box-shadow: 0 14px 34px var(--shadow);
    border: 2px solid #fff;
    animation: rise 1s .15s both;
  }
  .stage {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 4 / 3;
    background:
      repeating-linear-gradient(0deg, var(--gingham) 0 14px, transparent 14px 28px),
      repeating-linear-gradient(90deg, var(--gingham) 0 14px, transparent 14px 28px),
      var(--gingham-2);
    border: 2px dashed var(--gold-soft);
  }
  .slide {
    position: absolute; inset: 0;
    opacity: 0; transform: scale(1.04);
    transition: opacity .9s ease, transform 6s ease;
    background-size: cover; background-position: center;
  }
  .slide.active { opacity: 1; transform: scale(1); z-index: 1; }

  .placeholder {
    position: absolute; inset: 0;
    display: grid; place-content: center; gap: 8px; text-align: center;
    color: var(--blue-deep);
    z-index: 2;
  }
  .placeholder svg { width: 64px; height: 64px; margin: 0 auto; }
  .placeholder p { margin: 0; font-size: 18px; }
  .placeholder small { color: var(--blue-soft); }

  /* nav arrows */
  .nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,.9); border: 2px solid var(--gold-soft);
    color: var(--blue); font-size: 22px; cursor: pointer; z-index: 3;
    display: grid; place-content: center; transition: transform .2s, background .2s;
    box-shadow: 0 4px 10px var(--shadow);
  }
  .nav:hover { transform: translateY(-50%) scale(1.12); background: #fff; }
  .nav.prev { right: 10px; }
  .nav.next { left: 10px; }

  .dots-nav { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--gingham); border: none; cursor: pointer; transition: transform .2s, background .2s; padding: 0; }
  .dot.active { background: var(--gold); transform: scale(1.3); }

  /* ---- Upload ---- */
  .uploader {
    margin: 22px auto 0;
    background: var(--cream);
    border-radius: 22px;
    padding: 20px;
    text-align: center;
    border: 2px dashed var(--blue-soft);
    box-shadow: 0 10px 26px var(--shadow);
    transition: background .25s, border-color .25s, transform .2s;
    animation: rise 1.05s .25s both;
  }
  .uploader.drag { background: #eef4fd; border-color: var(--gold); transform: scale(1.01); }
  .uploader h2 { font-family: 'Suez One', serif; color: var(--blue); margin: 0 0 6px; font-size: 24px; }
  .uploader p { margin: 0 0 14px; color: var(--ink); }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--blue); color: #fff; border: none;
    font-family: 'Frank Ruhl Libre', serif; font-weight: 700; font-size: 17px;
    padding: 12px 26px; border-radius: 999px; cursor: pointer;
    box-shadow: 0 6px 16px var(--shadow); transition: transform .2s, background .2s;
  }
  .btn:hover { transform: translateY(-2px); background: var(--blue-deep); }
  .btn svg { width: 20px; height: 20px; }
  .hint { display: block; margin-top: 10px; color: var(--blue-soft); font-size: 14px; }

  .thumbs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
  .thumb { position: relative; width: 64px; height: 64px; border-radius: 12px; background-size: cover; background-position: center; border: 2px solid #fff; box-shadow: 0 3px 8px var(--shadow); }
  .thumb button {
    position: absolute; top: -6px; left: -6px; width: 22px; height: 22px; border-radius: 50%;
    background: var(--gold); color: #fff; border: 2px solid #fff; cursor: pointer; font-size: 13px; line-height: 1;
    display: grid; place-content: center; padding: 0;
  }

  /* ---- Music ---- */
  .music-row { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .btn.ghost { background: #fff; color: var(--blue); border: 2px solid var(--blue-soft); }
  .btn.ghost:hover { background: #eef4fd; }
  .track-name { color: var(--blue-deep); font-size: 14px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .music-fab {
    position: fixed; bottom: 18px; left: 18px; z-index: 5;
    width: 58px; height: 58px; border-radius: 50%;
    background: var(--blue); color: #fff; border: 3px solid #fff;
    box-shadow: 0 8px 20px var(--shadow); cursor: pointer;
    display: none; place-content: center; align-items: center;
    transition: transform .2s, background .2s;
  }
  .music-fab.show { display: grid; }
  .music-fab:hover { transform: scale(1.08); background: var(--blue-deep); }
  .music-fab svg { width: 26px; height: 26px; }
  .music-fab.playing { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 8px 20px var(--shadow); }
    50% { box-shadow: 0 8px 28px rgba(47,90,168,.45), 0 0 0 8px rgba(126,162,214,.18); }
  }

  footer { text-align: center; margin-top: 30px; color: var(--blue-deep); font-size: 16px; }
  footer .hearts { color: var(--gold); animation: beat 1.6s ease-in-out infinite; display: inline-block; }
  @keyframes beat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.25); } }
</style>
</head>
<body>

<div class="petals" id="petals"></div>

<div class="wrap">

  <!-- HERO -->
  <section class="hero">
    <svg class="bow" viewBox="0 0 100 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 30c-6-14-22-22-34-16-9 5-9 18 1 22 9 4 24 2 33-6z" fill="#7ea2d6" stroke="#2f5aa8" stroke-width="2"/>
      <path d="M50 30c6-14 22-22 34-16 9 5 9 18-1 22-9 4-24 2-33-6z" fill="#7ea2d6" stroke="#2f5aa8" stroke-width="2"/>
      <path d="M50 32c-4 10-9 26-7 34M50 32c4 10 9 26 7 34" stroke="#2f5aa8" stroke-width="2"/>
      <circle cx="50" cy="30" r="7" fill="#e8c07a" stroke="#d99a3a" stroke-width="2"/>
    </svg>

    <div class="flowers-row" id="heroFlowers"></div>

    <h1 class="name">ברוריה</h1>

    <div class="divider">
      <span class="dots">• • • •</span>
      <span class="age-heart">
        <svg viewBox="0 0 32 30"><path d="M16 28C6 20 1 14 1 8.5 1 4 4.5 1 8 1c2.8 0 5 1.6 6.5 4C16 2.6 18.2 1 21 1c3.5 0 7 3 7 7.5C28 14 23 20 16 28z" fill="none" stroke="#d99a3a" stroke-width="2"/></svg>
        <span>12</span>
      </span>
      <span class="dots">• • • •</span>
    </div>

    <p class="subtitle">בת מצווה</p>
  </section>

  <!-- SLIDESHOW -->
  <section class="slideshow">
    <div class="stage" id="stage">
      <div class="placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="#7ea2d6" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 17l-5-5L5 19"/></svg>
        <p>המצגת מחכה לתמונות שלך 🌼</p>
        <small>העלי תמונות למטה כדי להתחיל</small>
      </div>
    </div>
    <button class="nav prev" id="prev" aria-label="הקודם">›</button>
    <button class="nav next" id="next" aria-label="הבא">‹</button>
    <div class="dots-nav" id="dotsNav"></div>
  </section>

  <!-- UPLOAD -->
  <section class="uploader" id="uploader">
    <h2>הוספת תמונות 📸</h2>
    <p>גררי לכאן תמונות, או לחצי על הכפתור לבחירה מהמכשיר</p>
    <button class="btn" id="pickBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      בחירת תמונות
    </button>
    <input type="file" id="fileInput" accept="image/*" multiple hidden />
    <span class="hint">אפשר לבחור כמה תמונות יחד • הן יתווספו אוטומטית למצגת</span>
    <div class="thumbs" id="thumbs"></div>

    <div class="music-row">
      <button class="btn ghost" id="musicBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l10-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="16" cy="16" r="3"/></svg>
        בחירת מוזיקת רקע
      </button>
      <input type="file" id="musicInput" accept="audio/*" hidden />
      <span class="track-name" id="trackName"></span>
    </div>
    <span class="hint">המוזיקה תתנגן ברקע במהלך המצגת 🎵</span>
  </section>

  <audio id="audio" loop></audio>
  <button class="music-fab" id="musicFab" aria-label="הפעלה / עצירה של מוזיקה"></button>

  <footer>נחגוג יחד באהבה <span class="hearts">♥</span></footer>

</div>

<script>
  /* ---------- floating daisies ---------- */
  const petalSvg = `<svg viewBox="0 0 40 40" width="26" height="26" xmlns="http://www.w3.org/2000/svg">
    <g>${[0,60,120,180,240,300].map(a=>`<ellipse cx="20" cy="9" rx="5" ry="9" fill="#ffffff" stroke="#bcd0ee" transform="rotate(${a} 20 20)"/>`).join('')}
    <circle cx="20" cy="20" r="6" fill="#e8c07a"/></g></svg>`;
  const petalSvgBlue = petalSvg.replace(/#ffffff/g,'#d9e6f7').replace(/#e8c07a/g,'#7ea2d6');
  const petalsBox = document.getElementById('petals');
  for (let i=0;i<14;i++){
    const d=document.createElement('div');
    d.className='petal';
    d.innerHTML = i%3===0 ? petalSvgBlue : petalSvg;
    d.style.left = Math.random()*100+'%';
    d.style.animationDuration = (9+Math.random()*10)+'s';
    d.style.animationDelay = (-Math.random()*12)+'s';
    d.style.transform = `scale(${.5+Math.random()*.8})`;
    petalsBox.appendChild(d);
  }

  /* hero flower row */
  document.getElementById('heroFlowers').innerHTML = petalSvg+petalSvg+petalSvg;

  /* ---------- slideshow ---------- */
  let images = [];      // data URLs
  let current = 0;
  let timer = null;
  const stage = document.getElementById('stage');
  const placeholder = document.getElementById('placeholder');
  const dotsNav = document.getElementById('dotsNav');
  const thumbs = document.getElementById('thumbs');

  function render(){
    // remove old slides
    stage.querySelectorAll('.slide').forEach(s=>s.remove());
    dotsNav.innerHTML = '';
    thumbs.innerHTML = '';

    placeholder.style.display = images.length ? 'none' : 'grid';

    images.forEach((src,i)=>{
      const slide=document.createElement('div');
      slide.className='slide'+(i===current?' active':'');
      slide.style.backgroundImage=`url(${src})`;
      stage.appendChild(slide);

      const dot=document.createElement('button');
      dot.className='dot'+(i===current?' active':'');
      dot.onclick=()=>{ go(i); restart(); };
      dotsNav.appendChild(dot);

      const t=document.createElement('div');
      t.className='thumb';
      t.style.backgroundImage=`url(${src})`;
      const rm=document.createElement('button');
      rm.textContent='×';
      rm.title='הסרה';
      rm.onclick=()=>remove(i);
      t.appendChild(rm);
      thumbs.appendChild(t);
    });
  }

  function go(i){
    if(!images.length) return;
    current=(i+images.length)%images.length;
    stage.querySelectorAll('.slide').forEach((s,idx)=>s.classList.toggle('active',idx===current));
    dotsNav.querySelectorAll('.dot').forEach((d,idx)=>d.classList.toggle('active',idx===current));
  }

  function next(){ go(current+1); }
  function prev(){ go(current-1); }

  function restart(){
    if(timer) clearInterval(timer);
    if(images.length>1) timer=setInterval(next,4000);
  }

  function remove(i){
    images.splice(i,1);
    if(current>=images.length) current=Math.max(0,images.length-1);
    render(); restart();
  }

  document.getElementById('next').onclick=()=>{ next(); restart(); };
  document.getElementById('prev').onclick=()=>{ prev(); restart(); };

  /* ---------- upload ---------- */
  const fileInput=document.getElementById('fileInput');
  const uploader=document.getElementById('uploader');
  document.getElementById('pickBtn').onclick=()=>fileInput.click();

  function addFiles(files){
    const list=[...files].filter(f=>f.type.startsWith('image/'));
    let pending=list.length;
    if(!pending) return;
    list.forEach(file=>{
      const reader=new FileReader();
      reader.onload=e=>{
        images.push(e.target.result);
        if(--pending===0){ render(); restart(); }
      };
      reader.readAsDataURL(file);
    });
  }

  fileInput.onchange=e=>{ addFiles(e.target.files); fileInput.value=''; };

  ['dragenter','dragover'].forEach(ev=>uploader.addEventListener(ev,e=>{ e.preventDefault(); uploader.classList.add('drag'); }));
  ['dragleave','drop'].forEach(ev=>uploader.addEventListener(ev,e=>{ e.preventDefault(); uploader.classList.remove('drag'); }));
  uploader.addEventListener('drop',e=>addFiles(e.dataTransfer.files));

  /* ---------- background music ---------- */
  const audio=document.getElementById('audio');
  const musicInput=document.getElementById('musicInput');
  const musicBtn=document.getElementById('musicBtn');
  const trackName=document.getElementById('trackName');
  const fab=document.getElementById('musicFab');

  const playIcon='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  const pauseIcon='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
  fab.innerHTML=playIcon;

  musicBtn.onclick=()=>musicInput.click();
  musicInput.onchange=e=>{
    const file=e.target.files[0];
    if(!file) return;
    audio.src=URL.createObjectURL(file);
    trackName.textContent='🎵 '+file.name;
    fab.classList.add('show');
    audio.play().catch(()=>{}); // may need a user gesture; this click counts
    musicInput.value='';
  };

  fab.onclick=()=>{ if(audio.paused) audio.play().catch(()=>{}); else audio.pause(); };
  audio.onplay=()=>{ fab.innerHTML=pauseIcon; fab.classList.add('playing'); };
  audio.onpause=()=>{ fab.innerHTML=playIcon; fab.classList.remove('playing'); };

  /* ---------- permanent gallery (served from the site, visible to everyone) ---------- */
  async function loadGallery(){
    try{
      const res = await fetch('gallery/gallery.json', { cache: 'no-store' });
      if(!res.ok) return;
      const data = await res.json();
      const files = Array.isArray(data) ? data : (data.images || []);
      files.forEach(name => images.push('gallery/' + name));
      // optional permanent background music
      if(data && data.music){
        audio.src = 'gallery/' + data.music;
        trackName.textContent = '🎵 ' + data.music;
        fab.classList.add('show');
      }
      if(images.length){ current = 0; render(); restart(); }
    }catch(e){ /* no gallery yet — slideshow stays in upload mode */ }
  }

  render();
  loadGallery();
</script>
</body>
</html>
